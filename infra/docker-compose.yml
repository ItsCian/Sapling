services:
  postgres:
    image: postgres:16-alpine
    container_name: sapling_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     sapling
      POSTGRES_PASSWORD: sapling123
      POSTGRES_DB:       sapling
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sapling -d sapling"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
